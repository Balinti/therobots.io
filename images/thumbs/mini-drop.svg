<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 130" width="280" height="130">
<defs>
  <linearGradient id="bminidrop" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#08060f"/>
    <stop offset="100%" stop-color="#040408"/>
  </linearGradient>
  <radialGradient id="gminidrop" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#9d4edd" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#9d4edd" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="tminidrop" x1="0" y1="0" x2="0" y2="1">
    <stop offset="40%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.88)"/>
  </linearGradient>
  <linearGradient id="lminidrop" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#9d4edd"/>
    <stop offset="65%" stop-color="#7b2fbe" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#9d4edd" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="clipminidrop"><rect width="280" height="130"/></clipPath>
</defs>

<rect width="280" height="130" fill="url(#bminidrop)"/>
<rect width="280" height="130" fill="url(#gminidrop)"/>

<g clip-path="url(#clipminidrop)"><circle cx="81.2" cy="135" r="21.6"
      fill="#9d4edd" stroke="#9d4edd" stroke-width="0" opacity="0">
      <animate attributeName="cy" values="135;-21.589921651545428" dur="2.21s" begin="0.98s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0.4;0" dur="2.21s" begin="0.98s" repeatCount="indefinite"/>
    </circle><circle cx="63.0" cy="135" r="9.8"
      fill="none" stroke="#9d4edd" stroke-width="1.8" opacity="0">
      <animate attributeName="cy" values="135;-9.819945009616191" dur="2.17s" begin="0.08s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0.4;0" dur="2.17s" begin="0.08s" repeatCount="indefinite"/>
    </circle><circle cx="68.0" cy="135" r="6.6"
      fill="#9d4edd" stroke="#9d4edd" stroke-width="0" opacity="0">
      <animate attributeName="cy" values="135;-6.6221345778606215" dur="2.63s" begin="1.80s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0.4;0" dur="2.63s" begin="1.80s" repeatCount="indefinite"/>
    </circle></g>

<rect width="280" height="130" fill="url(#tminidrop)"/>

<text x="140" y="106"
  font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="800"
  fill="white" text-anchor="middle"
  paint-order="stroke" stroke="rgba(0,0,0,0.7)" stroke-width="4" stroke-linejoin="round"
>Mini Drop</text>


<rect x="110.6" y="116" width="58.8" height="13" fill="#5a189a" opacity="0.92" rx="3"/>
<text x="140" y="125.5"
  font-family="Inter,system-ui,sans-serif" font-size="7.5" font-weight="700"
  letter-spacing="1.2" fill="white" text-anchor="middle"
>ARCADE</text>

<rect y="127.5" width="280" height="2.5" fill="url(#lminidrop)"/>
</svg>
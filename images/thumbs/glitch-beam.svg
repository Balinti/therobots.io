<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 130" width="280" height="130">
<defs>
  <linearGradient id="bglitchbeam" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#020a1c"/>
    <stop offset="100%" stop-color="#010510"/>
  </linearGradient>
  <radialGradient id="gglitchbeam" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="tglitchbeam" x1="0" y1="0" x2="0" y2="1">
    <stop offset="40%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.88)"/>
  </linearGradient>
  <linearGradient id="lglitchbeam" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#00e5ff"/>
    <stop offset="65%" stop-color="#00aacc" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="clipglitchbeam"><rect width="280" height="130"/></clipPath>
</defs>

<rect width="280" height="130" fill="url(#bglitchbeam)"/>
<rect width="280" height="130" fill="url(#gglitchbeam)"/>

<g clip-path="url(#clipglitchbeam)"><line x1="300" y1="53.7" x2="280" y2="50.1"
      stroke="#00e5ff" stroke-width="3.3" stroke-linecap="round" opacity="0"
      transform="rotate(-3.566755739987538 140 65)">
      <animateTransform attributeName="transform" type="translate" values="0,0;-310,0" dur="1.60s" begin="0.99s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;0.54;0.54;0" dur="1.60s" begin="0.99s" repeatCount="indefinite"/>
    </line><line x1="320" y1="32.5" x2="300" y2="31.1"
      stroke="#00aacc" stroke-width="1.8" stroke-linecap="round" opacity="0"
      transform="rotate(-1.3505057533854867 140 65)">
      <animateTransform attributeName="transform" type="translate" values="0,0;-310,0" dur="1.16s" begin="0.32s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;0.47;0.47;0" dur="1.16s" begin="0.32s" repeatCount="indefinite"/>
    </line><line x1="340" y1="53.8" x2="320" y2="57.0"
      stroke="#00e5ff" stroke-width="4.6" stroke-linecap="round" opacity="0"
      transform="rotate(3.132542830573521 140 65)">
      <animateTransform attributeName="transform" type="translate" values="0,0;-310,0" dur="1.59s" begin="0.21s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;0.57;0.57;0" dur="1.59s" begin="0.21s" repeatCount="indefinite"/>
    </line></g>

<rect width="280" height="130" fill="url(#tglitchbeam)"/>

<text x="140" y="106"
  font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="800"
  fill="white" text-anchor="middle"
  paint-order="stroke" stroke="rgba(0,0,0,0.7)" stroke-width="4" stroke-linejoin="round"
>Glitch Beam</text>


<rect x="110.6" y="116" width="58.8" height="13" fill="#006688" opacity="0.92" rx="3"/>
<text x="140" y="125.5"
  font-family="Inter,system-ui,sans-serif" font-size="7.5" font-weight="700"
  letter-spacing="1.2" fill="white" text-anchor="middle"
>ACTION</text>

<rect y="127.5" width="280" height="2.5" fill="url(#lglitchbeam)"/>
</svg>
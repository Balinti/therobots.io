<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 130" width="280" height="130">
<defs>
  <linearGradient id="bslideflux" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#020a1c"/>
    <stop offset="100%" stop-color="#010510"/>
  </linearGradient>
  <radialGradient id="gslideflux" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="tslideflux" x1="0" y1="0" x2="0" y2="1">
    <stop offset="40%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.88)"/>
  </linearGradient>
  <linearGradient id="lslideflux" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#00e5ff"/>
    <stop offset="65%" stop-color="#00aacc" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="clipslideflux"><rect width="280" height="130"/></clipPath>
</defs>

<rect width="280" height="130" fill="url(#bslideflux)"/>
<rect width="280" height="130" fill="url(#gslideflux)"/>

<g clip-path="url(#clipslideflux)"><circle cx="115.2" cy="97.1" r="22.8" fill="#00e5ff" opacity="0.45">
      <animateTransform attributeName="transform" type="translate" values="0,0;-14.3,7.0;0,0" dur="4.81s" begin="1.83s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.45;0.18;0.45" dur="4.81s" begin="1.83s" repeatCount="indefinite"/>
    </circle><rect x="193.9" y="69.1" width="6.6" height="6.6" fill="#00aacc" opacity="0.50" rx="2.0">
      <animateTransform attributeName="transform" type="translate" values="0,0;7.1,-7.9;0,0" dur="5.76s" begin="0.73s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.50;0.20;0.50" dur="5.76s" begin="0.73s" repeatCount="indefinite"/>
    </rect><polygon points="174.0,66.5 169.4,72.9 161.9,70.4 161.9,62.6 169.4,60.1" fill="#00e5ff" opacity="0.42">
      <animateTransform attributeName="transform" type="translate" values="0,0;-11.9,-9.6;0,0" dur="3.03s" begin="0.02s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.42;0.17;0.42" dur="3.03s" begin="0.02s" repeatCount="indefinite"/>
    </polygon><circle cx="176.6" cy="17.7" r="13.3" fill="#00aacc" opacity="0.43">
      <animateTransform attributeName="transform" type="translate" values="0,0;6.8,-19.1;0,0" dur="6.56s" begin="0.15s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.43;0.17;0.43" dur="6.56s" begin="0.15s" repeatCount="indefinite"/>
    </circle></g>

<rect width="280" height="130" fill="url(#tslideflux)"/>

<text x="140" y="106"
  font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="800"
  fill="white" text-anchor="middle"
  paint-order="stroke" stroke="rgba(0,0,0,0.7)" stroke-width="4" stroke-linejoin="round"

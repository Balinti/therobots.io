<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 130" width="280" height="130">
<defs>
  <linearGradient id="bbeatbreaker" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#120318"/>
    <stop offset="100%" stop-color="#080110"/>
  </linearGradient>
  <radialGradient id="gbeatbreaker" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#cc44ff" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#cc44ff" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="tbeatbreaker" x1="0" y1="0" x2="0" y2="1">
    <stop offset="40%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.88)"/>
  </linearGradient>
  <linearGradient id="lbeatbreaker" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#cc44ff"/>
    <stop offset="65%" stop-color="#aa22ee" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#cc44ff" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="clipbeatbreaker"><rect width="280" height="130"/></clipPath>
</defs>

<rect width="280" height="130" fill="url(#bbeatbreaker)"/>
<rect width="280" height="130" fill="url(#gbeatbreaker)"/>

<g clip-path="url(#clipbeatbreaker)"><circle cx="174.1893946598725" cy="42.85825911044569" r="8" fill="none" stroke="#cc44ff" stroke-width="2.5" opacity="0">
      <animate attributeName="r" values="8;42.64925526516728" dur="1.64s" begin="0.00s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0" dur="1.64s" begin="0.00s" repeatCount="indefinite"/>
    </circle><circle cx="174.1893946598725" cy="42.85825911044569" r="8" fill="none" stroke="#cc44ff" stroke-width="2.5" opacity="0">
      <animate attributeName="r" values="8;56.340585294258915" dur="1.64s" begin="0.55s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0" dur="1.64s" begin="0.55s" repeatCount="indefinite"/>
    </circle><circle cx="174.1893946598725" cy="42.85825911044569" r="8" fill="none" stroke="#cc44ff" stroke-width="2.5" opacity="0">
      <animate attributeName="r" values="8;57.451952951367005" dur="1.64s" begin="1.09s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0" dur="1.64s" begin="1.09s" repeatCount="indefinite"/>
    </circle><circle cx="174.1893946598725" cy="42.85825911044569" r="7" fill="#cc44ff" opacity="0.7">

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 130" width="280" height="130">
<defs>
  <linearGradient id="btraptrek" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#08060f"/>
    <stop offset="100%" stop-color="#040408"/>
  </linearGradient>
  <radialGradient id="gtraptrek" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#9d4edd" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#9d4edd" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="ttraptrek" x1="0" y1="0" x2="0" y2="1">
    <stop offset="40%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.88)"/>
  </linearGradient>
  <linearGradient id="ltraptrek" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#9d4edd"/>
    <stop offset="65%" stop-color="#7b2fbe" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#9d4edd" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="cliptraptrek"><rect width="280" height="130"/></clipPath>
</defs>

<rect width="280" height="130" fill="url(#btraptrek)"/>
<rect width="280" height="130" fill="url(#gtraptrek)"/>

<g clip-path="url(#cliptraptrek)"><ellipse cx="0" cy="75.0" rx="7.9" ry="4.4" fill="#9d4edd" opacity="0.30">
      <animateTransform attributeName="transform" type="translate" values="-20,0;295,0;-20,0" dur="0.97s" begin="0.00s" repeatCount="indefinite"/>
    </ellipse><ellipse cx="0" cy="75.0" rx="6.7" ry="3.7" fill="#9d4edd" opacity="0.25">
      <animateTransform attributeName="transform" type="translate" values="-20,0;295,0;-20,0" dur="0.97s" begin="0.05s" repeatCount="indefinite"/>
    </ellipse><ellipse cx="0" cy="75.0" rx="5.5" ry="3.1" fill="#9d4edd" opacity="0.20">
      <animateTransform attributeName="transform" type="translate" values="-20,0;295,0;-20,0" dur="0.97s" begin="0.10s" repeatCount="indefinite"/>
    </ellipse><ellipse cx="0" cy="75.0" rx="4.4" ry="2.4" fill="#9d4edd" opacity="0.15">
      <animateTransform attributeName="transform" type="translate" values="-20,0;295,0;-20,0" dur="0.97s" begin="0.15s" repeatCount="indefinite"/>
    </ellipse><ellipse cx="0" cy="75.0" rx="3.2" ry="1.8" fill="#9d4edd" opacity="0.10">
      <animateTransform attributeName="transform" type="translate" values="-20,0;295,0;-20,0" dur="0.97s" begin="0.20s" repeatCount="indefinite"/>
    </ellipse><circle cx="-20" cy="75.0" r="8.8" fill="#9d4edd" opacity="0.9">
    <animateTransform attributeName="transform" type="translate" values="-20,0;295,0;-20,0" dur="0.97s" repeatCount="indefinite"/>
  </circle></g>

<rect width="280" height="130" fill="url(#ttraptrek)"/>

<text x="140" y="106"
  font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="800"
  fill="white" text-anchor="middle"
  paint-order="stroke" stroke="rgba(0,0,0,0.7)" stroke-width="4" stroke-linejoin="round"
>Trap Trek</text>


<rect x="110.6" y="116" width="58.8" height="13" fill="#5a189a" opacity="0.92" rx="3"/>
<text x="140" y="125.5"
  font-family="Inter,system-ui,sans-serif" font-size="7.5" font-weight="700"
  letter-spacing="1.2" fill="white" text-anchor="middle"
>ACTION</text>

<rect y="127.5" width="280" height="2.5" fill="url(#ltraptrek)"/>
</svg>
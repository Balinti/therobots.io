      <animateTransform attributeName="transform" type="translate" values="0,0;-310,0" dur="1.47s" begin="0.69s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;0.38;0.38;0" dur="1.47s" begin="0.69s" repeatCount="indefinite"/>
    </line><line x1="340" y1="23.4" x2="320" y2="26.8"

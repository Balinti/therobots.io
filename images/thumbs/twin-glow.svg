    <stop offset="65%" stop-color="#00aacc" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="cliptwinglow"><rect width="280" height="130"/></clipPath>
</defs>

<rect width="280" height="130" fill="url(#btwinglow)"/>
<rect width="280" height="130" fill="url(#gtwinglow)"/>


      transform="rotate(3.4391862016495285 140 65)">
      <animateTransform attributeName="transform" type="translate" values="0,0;-310,0" dur="1.30s" begin="0.47s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;0.69;0.69;0" dur="1.30s" begin="0.47s" repeatCount="indefinite"/>
    </line></g>

<rect width="280" height="130" fill="url(#tglowbeam)"/>

<text x="140" y="106"

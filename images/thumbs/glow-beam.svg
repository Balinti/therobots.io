      transform="rotate(5.919009820422859 140 65)">
      <animateTransform attributeName="transform" type="translate" values="0,0;-310,0" dur="1.19s" begin="0.51s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;0.53;0.53;0" dur="1.19s" begin="0.51s" repeatCount="indefinite"/>
    </line><line x1="340" y1="65.2" x2="320" y2="61.3"
      stroke="#00e5ff" stroke-width="2.1" stroke-linecap="round" opacity="0"
      transform="rotate(-3.8631220525976087 140 65)">
      <animateTransform attributeName="transform" type="translate" values="0,0;-310,0" dur="1.32s" begin="0.29s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;0.38;0.38;0" dur="1.32s" begin="0.29s" repeatCount="indefinite"/>
    </line><line x1="360" y1="45.7" x2="340" y2="49.1"

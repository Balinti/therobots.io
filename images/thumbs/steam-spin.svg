<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 130" width="280" height="130">
<defs>
  <linearGradient id="bsteamspin" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#08060f"/>
    <stop offset="100%" stop-color="#040408"/>
  </linearGradient>
  <radialGradient id="gsteamspin" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#9d4edd" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#9d4edd" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="tsteamspin" x1="0" y1="0" x2="0" y2="1">
    <stop offset="40%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.88)"/>
  </linearGradient>
  <linearGradient id="lsteamspin" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#9d4edd"/>
    <stop offset="65%" stop-color="#7b2fbe" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#9d4edd" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="clipsteamspin"><rect width="280" height="130"/></clipPath>
</defs>

<rect width="280" height="130" fill="url(#bsteamspin)"/>
<rect width="280" height="130" fill="url(#gsteamspin)"/>


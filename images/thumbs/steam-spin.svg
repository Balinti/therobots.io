      <animateTransform attributeName="transform" type="translate" values="0,0;-337.7445603133516,0" dur="0.60s" begin="1.27s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.49;0.49;0" dur="0.60s" begin="1.27s" repeatCount="indefinite"/>
    </line><line x1="280" y1="57.3" x2="343.8" y2="57.3"
      stroke="#9d4edd" stroke-width="3.8" stroke-linecap="round" opacity="0">
      <animateTransform attributeName="transform" type="translate" values="0,0;-348.76660549053145,0" dur="0.95s" begin="1.45s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.68;0.68;0" dur="0.95s" begin="1.45s" repeatCount="indefinite"/>
    </line><line x1="280" y1="75.6" x2="310.1" y2="75.6"
      stroke="#7b2fbe" stroke-width="3.9" stroke-linecap="round" opacity="0">
      <animateTransform attributeName="transform" type="translate" values="0,0;-315.09905309535077,0" dur="0.91s" begin="0.16s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.55;0.55;0" dur="0.91s" begin="0.16s" repeatCount="indefinite"/>
    </line><line x1="280" y1="98.8" x2="332.0" y2="98.8"
      stroke="#9d4edd" stroke-width="3.6" stroke-linecap="round" opacity="0">
      <animateTransform attributeName="transform" type="translate" values="0,0;-336.9508537899123,0" dur="0.55s" begin="0.87s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.64;0.64;0" dur="0.55s" begin="0.87s" repeatCount="indefinite"/>
    </line></g>

<rect width="280" height="130" fill="url(#tsteamspin)"/>

<text x="140" y="106"

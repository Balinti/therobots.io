<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 130" width="280" height="130">
<defs>
  <linearGradient id="bswingshift" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#08060f"/>
    <stop offset="100%" stop-color="#040408"/>
  </linearGradient>
  <radialGradient id="gswingshift" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#9d4edd" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#9d4edd" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="tswingshift" x1="0" y1="0" x2="0" y2="1">
    <stop offset="40%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.88)"/>
  </linearGradient>
  <linearGradient id="lswingshift" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#9d4edd"/>
    <stop offset="65%" stop-color="#7b2fbe" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#9d4edd" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="clipswingshift"><rect width="280" height="130"/></clipPath>
</defs>

<rect width="280" height="130" fill="url(#bswingshift)"/>
<rect width="280" height="130" fill="url(#gswingshift)"/>

<g clip-path="url(#clipswingshift)"><circle cx="211.9" cy="10" r="5" fill="#9d4edd" opacity="0.6"/>
  <g>
    <animateTransform attributeName="transform" type="rotate"
      values="-43.817992943529504 211.9 10;43.817992943529504 211.9 10;-43.817992943529504 211.9 10"
      dur="1.90s" repeatCount="indefinite" calcMode="spline" keySplines="0.5,0,0.5,1;0.5,0,0.5,1"/>
    <line x1="211.9" y1="10" x2="211.9" y2="61.2"
      stroke="#7b2fbe" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <circle cx="211.9" cy="61.2" r="5.1" fill="#9d4edd" opacity="0.85"/>
  </g></g>

<rect width="280" height="130" fill="url(#tswingshift)"/>

<text x="140" y="106"
  font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="800"
  fill="white" text-anchor="middle"
  paint-order="stroke" stroke="rgba(0,0,0,0.7)" stroke-width="4" stroke-linejoin="round"
>Swing Shift</text>


<rect x="110.6" y="116" width="58.8" height="13" fill="#5a189a" opacity="0.92" rx="3"/>

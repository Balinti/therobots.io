    <stop offset="65%" stop-color="#0088cc" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#00ccff" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="clipwavechain"><rect width="280" height="130"/></clipPath>
</defs>

<rect width="280" height="130" fill="url(#bwavechain)"/>
<rect width="280" height="130" fill="url(#gwavechain)"/>


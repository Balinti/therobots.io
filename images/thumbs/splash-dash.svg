<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 130" width="280" height="130">
<defs>
  <linearGradient id="bsplashdash" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#001830"/>
    <stop offset="100%" stop-color="#000810"/>
  </linearGradient>
  <radialGradient id="gsplashdash" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#00ccff" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#00ccff" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="tsplashdash" x1="0" y1="0" x2="0" y2="1">
    <stop offset="40%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.88)"/>
  </linearGradient>
  <linearGradient id="lsplashdash" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#00ccff"/>
    <stop offset="65%" stop-color="#0088cc" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#00ccff" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="clipsplashdash"><rect width="280" height="130"/></clipPath>
</defs>

<rect width="280" height="130" fill="url(#bsplashdash)"/>
<rect width="280" height="130" fill="url(#gsplashdash)"/>

<g clip-path="url(#clipsplashdash)"><line x1="280" y1="14.6" x2="336.4" y2="14.6"

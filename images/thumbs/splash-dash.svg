      <animateTransform attributeName="transform" type="translate" values="0,0;-314.82740311530125,0" dur="0.82s" begin="0.60s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.36;0.36;0" dur="0.82s" begin="0.60s" repeatCount="indefinite"/>
    </line><line x1="280" y1="56.7" x2="331.9" y2="56.7"
      stroke="#00ccff" stroke-width="2.7" stroke-linecap="round" opacity="0">
      <animateTransform attributeName="transform" type="translate" values="0,0;-336.91323358726527,0" dur="0.78s" begin="0.09s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.36;0.36;0" dur="0.78s" begin="0.09s" repeatCount="indefinite"/>
    </line><line x1="280" y1="81.8" x2="316.1" y2="81.8"
      stroke="#0088cc" stroke-width="2.0" stroke-linecap="round" opacity="0">
      <animateTransform attributeName="transform" type="translate" values="0,0;-321.13522798547876,0" dur="0.96s" begin="1.43s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.53;0.53;0" dur="0.96s" begin="1.43s" repeatCount="indefinite"/>
    </line><line x1="280" y1="99.4" x2="328.5" y2="99.4"
      stroke="#00ccff" stroke-width="2.5" stroke-linecap="round" opacity="0">
      <animateTransform attributeName="transform" type="translate" values="0,0;-333.4524804920546,0" dur="1.13s" begin="0.03s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.61;0.61;0" dur="1.13s" begin="0.03s" repeatCount="indefinite"/>
    </line></g>

<rect width="280" height="130" fill="url(#tsplashdash)"/>

<text x="140" y="106"
  font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="800"
  fill="white" text-anchor="middle"
  paint-order="stroke" stroke="rgba(0,0,0,0.7)" stroke-width="4" stroke-linejoin="round"
>Splash Dash</text>


<rect x="110.6" y="116" width="58.8" height="13" fill="#005588" opacity="0.92" rx="3"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 130" width="280" height="130">
<defs>
  <linearGradient id="bglowglide" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#020a1c"/>
    <stop offset="100%" stop-color="#010510"/>
  </linearGradient>
  <radialGradient id="gglowglide" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="tglowglide" x1="0" y1="0" x2="0" y2="1">
    <stop offset="40%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.88)"/>
  </linearGradient>
  <linearGradient id="lglowglide" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#00e5ff"/>
    <stop offset="65%" stop-color="#00aacc" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="clipglowglide"><rect width="280" height="130"/></clipPath>
</defs>

<rect width="280" height="130" fill="url(#bglowglide)"/>
<rect width="280" height="130" fill="url(#gglowglide)"/>

<g clip-path="url(#clipglowglide)"><line x1="300" y1="106.4" x2="280" y2="100.0"
      stroke="#00e5ff" stroke-width="3.3" stroke-linecap="round" opacity="0"
      transform="rotate(-6.365119192950688 140 65)">
      <animateTransform attributeName="transform" type="translate" values="0,0;-310,0" dur="0.87s" begin="1.03s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;0.62;0.62;0" dur="0.87s" begin="1.03s" repeatCount="indefinite"/>
    </line><line x1="320" y1="94.9" x2="300" y2="93.7"
      stroke="#00aacc" stroke-width="2.3" stroke-linecap="round" opacity="0"
      transform="rotate(-1.1798776764608636 140 65)">
      <animateTransform attributeName="transform" type="translate" values="0,0;-310,0" dur="1.48s" begin="0.78s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;0.68;0.68;0" dur="1.48s" begin="0.78s" repeatCount="indefinite"/>
    </line></g>

<rect width="280" height="130" fill="url(#tglowglide)"/>

<text x="140" y="106"
  font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="800"

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 130" width="280" height="130">
  <defs>
    <linearGradient id="bgsweet-pulse" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#200614"/>
      <stop offset="100%" stop-color="#0e0308"/>
    </linearGradient>
    <radialGradient id="glsweet-pulse" cx="76%" cy="38%" r="44%">
      <stop offset="0%" stop-color="#ff66cc" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ff66cc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tfsweet-pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(0,0,0,0.78)"/>
      <stop offset="52%" stop-color="rgba(0,0,0,0.45)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </linearGradient>
    <linearGradient id="bfsweet-pulse" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.82)"/>
    </linearGradient>
    <linearGradient id="alsweet-pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff66cc"/>
      <stop offset="60%" stop-color="#ff66cc" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff66cc" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="280" height="130" fill="url(#bgsweet-pulse)"/>
  <rect width="280" height="130" fill="url(#glsweet-pulse)"/>

  
  <g>
    <!-- Lollipop stick -->
    <line x1="232" y1="96" x2="232" y2="125" stroke="#ff66cc" stroke-width="6" stroke-linecap="round"/>
    <!-- Spinning lollipop -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="0 232 55;360 232 55" dur="4s" repeatCount="indefinite"/>
      <circle cx="232" cy="55" r="30" fill="#ff66cc" opacity="0.1"/>
      <circle cx="232" cy="55" r="26" fill="none" stroke="#ff66cc" stroke-width="8" stroke-dasharray="20 11" opacity="0.32"/>
      <circle cx="232" cy="55" r="18" fill="#ff66cc" opacity="0.18"/>
      <circle cx="232" cy="55" r="11" fill="#ff66cc" opacity="0.32"/>
      <circle cx="232" cy="55" r="5" fill="#ff44aa" opacity="0.7"/>
    </g>
    <!-- Bouncing candy A -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-10;0,0" dur="0.85s" repeatCount="indefinite"/>
      <circle cx="168" cy="36" r="8" fill="#ff66cc" opacity="0.42"/>
      <circle cx="168" cy="36" r="4" fill="white" opacity="0.25"/>
    </g>
    <!-- Bouncing candy B -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-8;0,0" dur="1.05s" begin="0.32s" repeatCount="indefinite"/>
      <circle cx="262" cy="24" r="6" fill="#ff44aa" opacity="0.4"/>
    </g>
    <!-- Bouncing candy C -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-6;0,0" dur="1.2s" begin="0.65s" repeatCount="indefinite"/>
      <circle cx="154" cy="68" r="5" fill="#ff66cc" opacity="0.35"/>
    </g>
    <!-- Sparkle -->
    <circle cx="202" cy="18" r="2.5" fill="#ff44aa" opacity="0.5">
      <animate attributeName="r" values="2.5;4;2.5" dur="0.75s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="0.75s" repeatCount="indefinite"/>
    </circle>
    <circle cx="272" cy="78" r="2" fill="white" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="1.1s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <rect width="280" height="130" fill="url(#tfsweet-pulse)"/>
  <rect width="280" height="130" fill="url(#bfsweet-pulse)"/>

  <text x="12" y="96"
    font-family="Inter, system-ui, sans-serif"
    font-size="21" font-weight="800" fill="white"
    paint-order="stroke" stroke="rgba(0,0,0,0.6)" stroke-width="3" stroke-linejoin="round"
  >Sweet Pulse</text>
  

  <rect x="12" y="113" width="59" height="14" fill="#aa1166" opacity="0.92" rx="2.5"/>
  <text x="19" y="123.5"
    font-family="Inter, system-ui, sans-serif"
    font-size="8" font-weight="700" letter-spacing="1" fill="white"
  >RHYTHM</text>

  <rect y="128" width="280" height="2.5" fill="url(#alsweet-pulse)"/>
</svg>
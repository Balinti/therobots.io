<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 130" width="280" height="130">
<defs>
  <linearGradient id="bsweetpulse" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#200614"/>
    <stop offset="100%" stop-color="#0e0308"/>
  </linearGradient>
  <radialGradient id="gsweetpulse" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#ff66cc" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#ff66cc" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="tsweetpulse" x1="0" y1="0" x2="0" y2="1">
    <stop offset="40%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.88)"/>
  </linearGradient>
  <linearGradient id="lsweetpulse" x1="0" y1="0" x2="1" y2="0">

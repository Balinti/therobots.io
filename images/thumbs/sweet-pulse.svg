    <stop offset="65%" stop-color="#ff44aa" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#ff66cc" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="clipsweetpulse"><rect width="280" height="130"/></clipPath>
</defs>

<rect width="280" height="130" fill="url(#bsweetpulse)"/>
<rect width="280" height="130" fill="url(#gsweetpulse)"/>

<g clip-path="url(#clipsweetpulse)"><circle cx="112.2780827833987" cy="79.66966229250414" r="8" fill="none" stroke="#ff66cc" stroke-width="2.5" opacity="0">
      <animate attributeName="r" values="8;58.67048747806588" dur="2.38s" begin="0.00s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0" dur="2.38s" begin="0.00s" repeatCount="indefinite"/>
    </circle><circle cx="112.2780827833987" cy="79.66966229250414" r="8" fill="none" stroke="#ff66cc" stroke-width="2.5" opacity="0">
      <animate attributeName="r" values="8;57.88355128324673" dur="2.38s" begin="0.79s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0" dur="2.38s" begin="0.79s" repeatCount="indefinite"/>
    </circle><circle cx="112.2780827833987" cy="79.66966229250414" r="8" fill="none" stroke="#ff66cc" stroke-width="2.5" opacity="0">
      <animate attributeName="r" values="8;42.91417491224459" dur="2.38s" begin="1.59s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0" dur="2.38s" begin="1.59s" repeatCount="indefinite"/>
    </circle><circle cx="112.2780827833987" cy="79.66966229250414" r="7" fill="#ff66cc" opacity="0.7">

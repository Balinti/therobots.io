    <stop offset="65%" stop-color="#22aa22" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#44cc44" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="clipvineblur"><rect width="280" height="130"/></clipPath>
</defs>

<rect width="280" height="130" fill="url(#bvineblur)"/>
<rect width="280" height="130" fill="url(#gvineblur)"/>

<g clip-path="url(#clipvineblur)"><circle cx="143.1" cy="10" r="5" fill="#44cc44" opacity="0.6"/>
  <g>

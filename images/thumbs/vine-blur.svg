      dur="1.95s" repeatCount="indefinite" calcMode="spline" keySplines="0.5,0,0.5,1;0.5,0,0.5,1"/>
    <line x1="143.1" y1="10" x2="143.1" y2="62.9"
      stroke="#22aa22" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <circle cx="143.1" cy="62.9" r="9.5" fill="#44cc44" opacity="0.85"/>
  </g></g>

<rect width="280" height="130" fill="url(#tvineblur)"/>

<text x="140" y="106"
  font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="800"

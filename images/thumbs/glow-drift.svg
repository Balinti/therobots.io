      <animateTransform attributeName="transform" type="translate" values="0,0;-310,0" dur="1.67s" begin="0.64s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;0.50;0.50;0" dur="1.67s" begin="0.64s" repeatCount="indefinite"/>
    </line></g>

<rect width="280" height="130" fill="url(#tglowdrift)"/>

<text x="140" y="106"

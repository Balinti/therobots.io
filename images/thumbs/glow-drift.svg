      <animateTransform attributeName="transform" type="translate" values="0,0;-310,0" dur="0.92s" begin="0.91s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;0.54;0.54;0" dur="0.92s" begin="0.91s" repeatCount="indefinite"/>
    </line><line x1="340" y1="53.0" x2="320" y2="55.0"
      stroke="#00e5ff" stroke-width="2.5" stroke-linecap="round" opacity="0"
      transform="rotate(2.0444159301799756 140 65)">
      <animateTransform attributeName="transform" type="translate" values="0,0;-310,0" dur="0.96s" begin="0.16s" repeatCount="indefinite" additive="sum"/>

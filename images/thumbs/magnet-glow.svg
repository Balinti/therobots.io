      transform="rotate(-1.2617234370582089 140 65)">
      <animateTransform attributeName="transform" type="translate" values="0,0;-310,0" dur="1.19s" begin="0.89s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;0.60;0.60;0" dur="1.19s" begin="0.89s" repeatCount="indefinite"/>
    </line><line x1="320" y1="57.7" x2="300" y2="59.0"
      stroke="#00aacc" stroke-width="5.2" stroke-linecap="round" opacity="0"
      transform="rotate(1.2554130409274737 140 65)">
      <animateTransform attributeName="transform" type="translate" values="0,0;-310,0" dur="1.63s" begin="0.89s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;0.32;0.32;0" dur="1.63s" begin="0.89s" repeatCount="indefinite"/>
    </line><line x1="340" y1="61.4" x2="320" y2="66.1"
      stroke="#00e5ff" stroke-width="1.6" stroke-linecap="round" opacity="0"
      transform="rotate(4.6766028756221285 140 65)">
      <animateTransform attributeName="transform" type="translate" values="0,0;-310,0" dur="1.36s" begin="1.32s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;0.50;0.50;0" dur="1.36s" begin="1.32s" repeatCount="indefinite"/>
    </line></g>

<rect width="280" height="130" fill="url(#tmagnetglow)"/>

<text x="140" y="106"
  font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="800"
  fill="white" text-anchor="middle"
  paint-order="stroke" stroke="rgba(0,0,0,0.7)" stroke-width="4" stroke-linejoin="round"
>Magnet Glow</text>


<rect x="110.6" y="116" width="58.8" height="13" fill="#006688" opacity="0.92" rx="3"/>

      <animate attributeName="opacity" values="0.22;0.09;0.22" dur="4.11s" begin="1.64s" repeatCount="indefinite"/>
    </circle><rect x="170.1" y="37.0" width="7.1" height="7.1" fill="#00e5ff" opacity="0.44" rx="2.1">
      <animateTransform attributeName="transform" type="translate" values="0,0;0.6,9.5;0,0" dur="3.42s" begin="2.23s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.44;0.18;0.44" dur="3.42s" begin="2.23s" repeatCount="indefinite"/>
    </rect></g>

<rect width="280" height="130" fill="url(#tdotdrift)"/>


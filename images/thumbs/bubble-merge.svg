<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 130" width="280" height="130">
  <defs>
    <linearGradient id="bgbubble-merge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001830"/>
      <stop offset="100%" stop-color="#000810"/>
    </linearGradient>
    <radialGradient id="glbubble-merge" cx="76%" cy="38%" r="44%">
      <stop offset="0%" stop-color="#00ccff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00ccff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tfbubble-merge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(0,0,0,0.78)"/>
      <stop offset="52%" stop-color="rgba(0,0,0,0.45)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </linearGradient>
    <linearGradient id="bfbubble-merge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.82)"/>
    </linearGradient>
    <linearGradient id="albubble-merge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ccff"/>
      <stop offset="60%" stop-color="#00ccff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00ccff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="280" height="130" fill="url(#bgbubble-merge)"/>
  <rect width="280" height="130" fill="url(#glbubble-merge)"/>

  
  <g>
    <!-- Wave layer 1 -->
    <path fill="#00ccff" opacity="0.35">
      <animate attributeName="d"
        values="M148,78 Q168,62 188,78 Q208,94 228,78 Q248,62 280,70 L280,130 L148,130 Z;
                M148,72 Q168,88 188,72 Q208,56 228,72 Q248,88 280,76 L280,130 L148,130 Z;
                M148,78 Q168,62 188,78 Q208,94 228,78 Q248,62 280,70 L280,130 L148,130 Z"
        dur="2.2s" repeatCount="indefinite"/>
    </path>
    <!-- Wave layer 2 -->
    <path fill="#00ccff" opacity="0.5">
      <animate attributeName="d"
        values="M148,96 Q170,80 192,96 Q214,112 236,96 Q258,80 280,90 L280,130 L148,130 Z;
                M148,90 Q170,106 192,90 Q214,74 236,90 Q258,106 280,96 L280,130 L148,130 Z;
                M148,96 Q170,80 192,96 Q214,112 236,96 Q258,80 280,90 L280,130 L148,130 Z"
        dur="1.7s" repeatCount="indefinite"/>
    </path>
    <!-- Fish swimming right-to-left -->
    <g opacity="0.75">
      <animateTransform attributeName="transform" type="translate" values="285,52;148,68;285,52" dur="4.5s" repeatCount="indefinite"/>
      <ellipse cx="0" cy="0" rx="16" ry="8" fill="#00ccff"/>
      <path d="M-16,0 L-26,-8 L-26,8 Z" fill="#00ccff"/>
      <circle cx="9" cy="-2.5" r="2.5" fill="white" opacity="0.5"/>
    </g>
    <!-- Bubbles rising -->
    <circle cx="162" cy="118" r="4.5" fill="none" stroke="#00ccff" stroke-width="1.8" opacity="0">
      <animate attributeName="cy" values="118;20" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0.4;0" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="188" cy="125" r="3" fill="none" stroke="#00ccff" stroke-width="1.5" opacity="0">
      <animate attributeName="cy" values="125;30" dur="2.2s" begin="0.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0.3;0" dur="2.2s" begin="0.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="248" cy="120" r="3.5" fill="none" stroke="#00ccff" stroke-width="1.5" opacity="0">
      <animate attributeName="cy" values="120;25" dur="3s" begin="1.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0.3;0" dur="3s" begin="1.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <rect width="280" height="130" fill="url(#tfbubble-merge)"/>
  <rect width="280" height="130" fill="url(#bfbubble-merge)"/>

  <text x="12" y="96"
    font-family="Inter, system-ui, sans-serif"
    font-size="21" font-weight="800" fill="white"
    paint-order="stroke" stroke="rgba(0,0,0,0.6)" stroke-width="3" stroke-linejoin="round"
  >Bubble Merge</text>
  

  <rect x="12" y="113" width="59" height="14" fill="#005588" opacity="0.92" rx="2.5"/>
  <text x="19" y="123.5"
    font-family="Inter, system-ui, sans-serif"
    font-size="8" font-weight="700" letter-spacing="1" fill="white"
  >PUZZLE</text>

  <rect y="128" width="280" height="2.5" fill="url(#albubble-merge)"/>
</svg>
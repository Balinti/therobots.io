<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 130" width="280" height="130">
<defs>
  <linearGradient id="bglowdivide" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#020a1c"/>
    <stop offset="100%" stop-color="#010510"/>
  </linearGradient>
  <radialGradient id="gglowdivide" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="tglowdivide" x1="0" y1="0" x2="0" y2="1">
    <stop offset="40%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.88)"/>
  </linearGradient>
  <linearGradient id="lglowdivide" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#00e5ff"/>
    <stop offset="65%" stop-color="#00aacc" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="clipglowdivide"><rect width="280" height="130"/></clipPath>
</defs>

<rect width="280" height="130" fill="url(#bglowdivide)"/>
<rect width="280" height="130" fill="url(#gglowdivide)"/>

<g clip-path="url(#clipglowdivide)"><line x1="300" y1="87.2" x2="280" y2="89.0"

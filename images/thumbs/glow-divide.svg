      transform="rotate(1.8245928779534522 140 65)">
      <animateTransform attributeName="transform" type="translate" values="0,0;-310,0" dur="1.57s" begin="1.00s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;0.41;0.41;0" dur="1.57s" begin="1.00s" repeatCount="indefinite"/>
    </line><line x1="320" y1="53.3" x2="300" y2="47.3"
      stroke="#00aacc" stroke-width="5.4" stroke-linecap="round" opacity="0"
      transform="rotate(-6.003954182030622 140 65)">
      <animateTransform attributeName="transform" type="translate" values="0,0;-310,0" dur="1.75s" begin="0.70s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;0.55;0.55;0" dur="1.75s" begin="0.70s" repeatCount="indefinite"/>
    </line><line x1="340" y1="78.9" x2="320" y2="75.8"
      stroke="#00e5ff" stroke-width="3.4" stroke-linecap="round" opacity="0"
      transform="rotate(-3.136329288975412 140 65)">
      <animateTransform attributeName="transform" type="translate" values="0,0;-310,0" dur="1.30s" begin="0.04s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;0.37;0.37;0" dur="1.30s" begin="0.04s" repeatCount="indefinite"/>
    </line></g>

<rect width="280" height="130" fill="url(#tglowdivide)"/>

<text x="140" y="106"
  font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="800"
  fill="white" text-anchor="middle"
  paint-order="stroke" stroke="rgba(0,0,0,0.7)" stroke-width="4" stroke-linejoin="round"
>Glow Divide</text>



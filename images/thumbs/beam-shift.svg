<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 130" width="280" height="130">
  <defs>
    <linearGradient id="bgbeam-shift" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020a1c"/>
      <stop offset="100%" stop-color="#010510"/>
    </linearGradient>
    <radialGradient id="glbeam-shift" cx="76%" cy="38%" r="44%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tfbeam-shift" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(0,0,0,0.78)"/>
      <stop offset="52%" stop-color="rgba(0,0,0,0.45)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </linearGradient>
    <linearGradient id="bfbeam-shift" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.82)"/>
    </linearGradient>
    <linearGradient id="albeam-shift" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="60%" stop-color="#00e5ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="280" height="130" fill="url(#bgbeam-shift)"/>
  <rect width="280" height="130" fill="url(#glbeam-shift)"/>

  
  <g>
    <line x1="148" y1="0" x2="148" y2="130" stroke="#00e5ff" stroke-width="0.5" opacity="0.2"/><line x1="168" y1="0" x2="168" y2="130" stroke="#00e5ff" stroke-width="0.5" opacity="0.2"/><line x1="188" y1="0" x2="188" y2="130" stroke="#00e5ff" stroke-width="0.5" opacity="0.2"/><line x1="208" y1="0" x2="208" y2="130" stroke="#00e5ff" stroke-width="0.5" opacity="0.2"/><line x1="228" y1="0" x2="228" y2="130" stroke="#00e5ff" stroke-width="0.5" opacity="0.2"/><line x1="248" y1="0" x2="248" y2="130" stroke="#00e5ff" stroke-width="0.5" opacity="0.2"/><line x1="268" y1="0" x2="268" y2="130" stroke="#00e5ff" stroke-width="0.5" opacity="0.2"/><line x1="148" y1="0" x2="280" y2="0" stroke="#00e5ff" stroke-width="0.5" opacity="0.2"/><line x1="148" y1="16" x2="280" y2="16" stroke="#00e5ff" stroke-width="0.5" opacity="0.2"/><line x1="148" y1="32" x2="280" y2="32" stroke="#00e5ff" stroke-width="0.5" opacity="0.2"/><line x1="148" y1="48" x2="280" y2="48" stroke="#00e5ff" stroke-width="0.5" opacity="0.2"/><line x1="148" y1="64" x2="280" y2="64" stroke="#00e5ff" stroke-width="0.5" opacity="0.2"/><line x1="148" y1="80" x2="280" y2="80" stroke="#00e5ff" stroke-width="0.5" opacity="0.2"/><line x1="148" y1="96" x2="280" y2="96" stroke="#00e5ff" stroke-width="0.5" opacity="0.2"/><line x1="148" y1="112" x2="280" y2="112" stroke="#00e5ff" stroke-width="0.5" opacity="0.2"/><line x1="148" y1="128" x2="280" y2="128" stroke="#00e5ff" stroke-width="0.5" opacity="0.2"/>
    <!-- Nodes -->
    <circle cx="173" cy="30" r="5.5" fill="#00e5ff" opacity="0.7">
      <animate attributeName="r" values="5.5;8;5.5" dur="1.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="228" cy="68" r="5.5" fill="#00e5ff" opacity="0.7">
      <animate attributeName="r" values="5.5;8;5.5" dur="1.1s" begin="0.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.1s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="262" cy="30" r="4.5" fill="#00e5ff" opacity="0.6">
      <animate attributeName="r" values="4.5;7;4.5" dur="1.7s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <!-- Circuit trace -->
    <path d="M173,30 L228,30 L228,68 L262,68" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.45"/>
    <!-- Travelling glow dot -->
    <circle r="4.5" fill="#00e5ff" opacity="0.95">
      <animateMotion dur="2s" repeatCount="indefinite"
        path="M173,30 L228,30 L228,68 L262,68"/>
      <animate attributeName="opacity" values="0.95;0.3;0.95" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Scanline -->
    <rect x="148" y="-4" width="132" height="4" fill="#00e5ff" opacity="0.07">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,134" dur="2.8s" repeatCount="indefinite"/>
    </rect>
  </g>

  <rect width="280" height="130" fill="url(#tfbeam-shift)"/>
  <rect width="280" height="130" fill="url(#bfbeam-shift)"/>

  <text x="12" y="96"
    font-family="Inter, system-ui, sans-serif"
    font-size="21" font-weight="800" fill="white"
    paint-order="stroke" stroke="rgba(0,0,0,0.6)" stroke-width="3" stroke-linejoin="round"
  >Beam Shift</text>
  

  <rect x="12" y="113" width="59" height="14" fill="#006688" opacity="0.92" rx="2.5"/>
  <text x="19" y="123.5"
    font-family="Inter, system-ui, sans-serif"
    font-size="8" font-weight="700" letter-spacing="1" fill="white"
  >ACTION</text>

  <rect y="128" width="280" height="2.5" fill="url(#albeam-shift)"/>
</svg>
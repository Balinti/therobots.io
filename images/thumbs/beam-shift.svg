<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 130" width="280" height="130">
<defs>
  <linearGradient id="bbeamshift" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#020a1c"/>
    <stop offset="100%" stop-color="#010510"/>
  </linearGradient>
  <radialGradient id="gbeamshift" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="tbeamshift" x1="0" y1="0" x2="0" y2="1">
    <stop offset="40%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.88)"/>
  </linearGradient>
  <linearGradient id="lbeamshift" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#00e5ff"/>
    <stop offset="65%" stop-color="#00aacc" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="clipbeamshift"><rect width="280" height="130"/></clipPath>
</defs>

<rect width="280" height="130" fill="url(#bbeamshift)"/>
<rect width="280" height="130" fill="url(#gbeamshift)"/>

<g clip-path="url(#clipbeamshift)"><line x1="300" y1="101.7" x2="280" y2="96.5"
      stroke="#00e5ff" stroke-width="2.6" stroke-linecap="round" opacity="0"
      transform="rotate(-5.140049802754086 140 65)">
      <animateTransform attributeName="transform" type="translate" values="0,0;-310,0" dur="1.78s" begin="0.11s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;0.39;0.39;0" dur="1.78s" begin="0.11s" repeatCount="indefinite"/>
    </line><line x1="320" y1="46.5" x2="300" y2="51.9"
      stroke="#00aacc" stroke-width="2.5" stroke-linecap="round" opacity="0"
      transform="rotate(5.370791838008629 140 65)">
      <animateTransform attributeName="transform" type="translate" values="0,0;-310,0" dur="1.35s" begin="0.25s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;0.61;0.61;0" dur="1.35s" begin="0.25s" repeatCount="indefinite"/>
    </line><line x1="340" y1="55.9" x2="320" y2="56.0"
      stroke="#00e5ff" stroke-width="4.4" stroke-linecap="round" opacity="0"
      transform="rotate(0.08244208585993396 140 65)">
      <animateTransform attributeName="transform" type="translate" values="0,0;-310,0" dur="1.00s" begin="0.01s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;0.61;0.61;0" dur="1.00s" begin="0.01s" repeatCount="indefinite"/>
    </line><line x1="360" y1="27.6" x2="340" y2="23.1"
      stroke="#00aacc" stroke-width="4.1" stroke-linecap="round" opacity="0"
      transform="rotate(-4.46562596875374 140 65)">
      <animateTransform attributeName="transform" type="translate" values="0,0;-310,0" dur="1.46s" begin="0.01s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;0.34;0.34;0" dur="1.46s" begin="0.01s" repeatCount="indefinite"/>
    </line></g>

<rect width="280" height="130" fill="url(#tbeamshift)"/>

<text x="140" y="106"
  font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="800"
  fill="white" text-anchor="middle"
  paint-order="stroke" stroke="rgba(0,0,0,0.7)" stroke-width="4" stroke-linejoin="round"
>Beam Shift</text>


<rect x="110.6" y="116" width="58.8" height="13" fill="#006688" opacity="0.92" rx="3"/>
<text x="140" y="125.5"
  font-family="Inter,system-ui,sans-serif" font-size="7.5" font-weight="700"
  letter-spacing="1.2" fill="white" text-anchor="middle"
>ACTION</text>

<rect y="127.5" width="280" height="2.5" fill="url(#lbeamshift)"/>
</svg>
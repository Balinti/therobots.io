<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 130" width="280" height="130">
  <defs>
    <linearGradient id="bgcosmic-chain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0420"/>
      <stop offset="100%" stop-color="#030210"/>
    </linearGradient>
    <radialGradient id="glcosmic-chain" cx="76%" cy="38%" r="44%">
      <stop offset="0%" stop-color="#9d4edd" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#9d4edd" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tfcosmic-chain" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(0,0,0,0.78)"/>
      <stop offset="52%" stop-color="rgba(0,0,0,0.45)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </linearGradient>
    <linearGradient id="bfcosmic-chain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.82)"/>
    </linearGradient>
    <linearGradient id="alcosmic-chain" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9d4edd"/>
      <stop offset="60%" stop-color="#9d4edd" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#9d4edd" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="280" height="130" fill="url(#bgcosmic-chain)"/>
  <rect width="280" height="130" fill="url(#glcosmic-chain)"/>

  
  <g>
    <circle cx="148" cy="3" r="2.2" fill="white" opacity="0.35">
      <animate attributeName="opacity" values="0.35;0.9;0.35" dur="1.4s" begin="0.0s" repeatCount="indefinite"/>
    </circle><circle cx="177" cy="22" r="1.2" fill="white" opacity="0.35">
      <animate attributeName="opacity" values="0.35;0.9;0.35" dur="1.8s" begin="0.3s" repeatCount="indefinite"/>
    </circle><circle cx="206" cy="41" r="1.2" fill="white" opacity="0.35">
      <animate attributeName="opacity" values="0.35;0.9;0.35" dur="2.1s" begin="0.6s" repeatCount="indefinite"/>
    </circle><circle cx="235" cy="60" r="1.2" fill="white" opacity="0.35">
      <animate attributeName="opacity" values="0.35;0.9;0.35" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
    </circle><circle cx="264" cy="79" r="2.2" fill="white" opacity="0.35">
      <animate attributeName="opacity" values="0.35;0.9;0.35" dur="2.8s" begin="1.1s" repeatCount="indefinite"/>
    </circle><circle cx="159" cy="13" r="1.2" fill="white" opacity="0.35">
      <animate attributeName="opacity" values="0.35;0.9;0.35" dur="1.4s" begin="1.4s" repeatCount="indefinite"/>
    </circle><circle cx="188" cy="32" r="1.2" fill="white" opacity="0.35">
      <animate attributeName="opacity" values="0.35;0.9;0.35" dur="1.8s" begin="1.7s" repeatCount="indefinite"/>
    </circle><circle cx="217" cy="51" r="1.2" fill="white" opacity="0.35">
      <animate attributeName="opacity" values="0.35;0.9;0.35" dur="2.1s" begin="2.0s" repeatCount="indefinite"/>
    </circle><circle cx="246" cy="70" r="2.2" fill="white" opacity="0.35">
      <animate attributeName="opacity" values="0.35;0.9;0.35" dur="2.4s" begin="2.2s" repeatCount="indefinite"/>
    </circle><circle cx="275" cy="4" r="1.2" fill="white" opacity="0.35">
      <animate attributeName="opacity" values="0.35;0.9;0.35" dur="2.8s" begin="2.5s" repeatCount="indefinite"/>
    </circle><circle cx="170" cy="23" r="1.2" fill="white" opacity="0.35">
      <animate attributeName="opacity" values="0.35;0.9;0.35" dur="1.4s" begin="2.8s" repeatCount="indefinite"/>
    </circle><circle cx="199" cy="42" r="1.2" fill="white" opacity="0.35">
      <animate attributeName="opacity" values="0.35;0.9;0.35" dur="1.8s" begin="3.1s" repeatCount="indefinite"/>
    </circle><circle cx="228" cy="61" r="2.2" fill="white" opacity="0.35">
      <animate attributeName="opacity" values="0.35;0.9;0.35" dur="2.1s" begin="3.4s" repeatCount="indefinite"/>
    </circle><circle cx="257" cy="80" r="1.2" fill="white" opacity="0.35">
      <animate attributeName="opacity" values="0.35;0.9;0.35" dur="2.4s" begin="3.6s" repeatCount="indefinite"/>
    </circle>
    <!-- Planet -->
    <circle cx="232" cy="55" r="30" fill="#9d4edd" opacity="0.1"/>
    <circle cx="232" cy="55" r="25" fill="none" stroke="#9d4edd" stroke-width="2.5" opacity="0.5">
      <animate attributeName="stroke-opacity" values="0.5;0.8;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Orbit ring -->
    <ellipse cx="232" cy="55" rx="44" ry="9" fill="none" stroke="#9d4edd" stroke-width="2" opacity="0.45"/>
    <!-- Moon orbiting via animateMotion -->
    <circle r="5.5" fill="#c77dff" opacity="0.85">
      <animateMotion dur="3.2s" repeatCount="indefinite"
        path="M276,55 A44,9 0 0,1 188,55 A44,9 0 0,1 276,55"/>
    </circle>
    <!-- Shooting star -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;0" dur="3.5s" begin="1s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="280,15;148,55" dur="3.5s" begin="1s" repeatCount="indefinite"/>
      <line x1="0" y1="0" x2="22" y2="0" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
    </g>
  </g>

  <rect width="280" height="130" fill="url(#tfcosmic-chain)"/>
  <rect width="280" height="130" fill="url(#bfcosmic-chain)"/>

  <text x="12" y="96"
    font-family="Inter, system-ui, sans-serif"
    font-size="21" font-weight="800" fill="white"
    paint-order="stroke" stroke="rgba(0,0,0,0.6)" stroke-width="3" stroke-linejoin="round"
  >Cosmic Chain</text>
  

  <rect x="12" y="113" width="59" height="14" fill="#6a1f9a" opacity="0.92" rx="2.5"/>
  <text x="19" y="123.5"
    font-family="Inter, system-ui, sans-serif"
    font-size="8" font-weight="700" letter-spacing="1" fill="white"
  >PUZZLE</text>

  <rect y="128" width="280" height="2.5" fill="url(#alcosmic-chain)"/>
</svg>
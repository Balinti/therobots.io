      transform="rotate(4.930457086868225 140 65)">
      <animateTransform attributeName="transform" type="translate" values="0,0;-310,0" dur="1.14s" begin="0.34s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;0.59;0.59;0" dur="1.14s" begin="0.34s" repeatCount="indefinite"/>
    </line></g>

<rect width="280" height="130" fill="url(#tglowdrop)"/>

<text x="140" y="106"

      transform="rotate(5.195323229463614 140 65)">
      <animateTransform attributeName="transform" type="translate" values="0,0;-310,0" dur="0.90s" begin="1.34s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;0.60;0.60;0" dur="0.90s" begin="1.34s" repeatCount="indefinite"/>
    </line><line x1="340" y1="83.2" x2="320" y2="85.7"
      stroke="#00e5ff" stroke-width="2.9" stroke-linecap="round" opacity="0"
      transform="rotate(2.499571482185174 140 65)">
      <animateTransform attributeName="transform" type="translate" values="0,0;-310,0" dur="0.82s" begin="1.07s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;0.36;0.36;0" dur="0.82s" begin="1.07s" repeatCount="indefinite"/>
    </line><line x1="360" y1="67.7" x2="340" y2="72.6"

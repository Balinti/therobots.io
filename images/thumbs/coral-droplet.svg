      <animate attributeName="opacity" values="0;0.6;0.4;0" dur="3.03s" begin="0.18s" repeatCount="indefinite"/>
    </circle><circle cx="62.8" cy="135" r="22.1"
      fill="none" stroke="#00ccff" stroke-width="1.8" opacity="0">
      <animate attributeName="cy" values="135;-22.05902677426558" dur="1.93s" begin="1.51s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0.4;0" dur="1.93s" begin="1.51s" repeatCount="indefinite"/>
    </circle><circle cx="117.5" cy="135" r="14.4"
      fill="#00ccff" stroke="#00ccff" stroke-width="0" opacity="0">
      <animate attributeName="cy" values="135;-14.408692696459752" dur="2.69s" begin="0.36s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0.4;0" dur="2.69s" begin="0.36s" repeatCount="indefinite"/>
    </circle></g>

<rect width="280" height="130" fill="url(#tcoraldroplet)"/>


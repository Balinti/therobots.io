  <linearGradient id="lcoraldroplet" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#00ccff"/>
    <stop offset="65%" stop-color="#0088cc" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#00ccff" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="clipcoraldroplet"><rect width="280" height="130"/></clipPath>
</defs>

<rect width="280" height="130" fill="url(#bcoraldroplet)"/>
<rect width="280" height="130" fill="url(#gcoraldroplet)"/>

<g clip-path="url(#clipcoraldroplet)"><circle cx="151.3" cy="135" r="7.1"

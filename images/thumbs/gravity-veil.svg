<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 130" width="280" height="130">
<defs>
  <linearGradient id="bgravityveil" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0c0420"/>
    <stop offset="100%" stop-color="#030210"/>
  </linearGradient>
  <radialGradient id="ggravityveil" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#9d4edd" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#9d4edd" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="tgravityveil" x1="0" y1="0" x2="0" y2="1">

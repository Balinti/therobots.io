<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 130" width="280" height="130">
<defs>
  <linearGradient id="bmagmashift" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#2a0600"/>
    <stop offset="100%" stop-color="#0a0200"/>
  </linearGradient>
  <radialGradient id="gmagmashift" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#ff5500" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#ff5500" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="tmagmashift" x1="0" y1="0" x2="0" y2="1">
    <stop offset="40%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.88)"/>
  </linearGradient>
  <linearGradient id="lmagmashift" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#ff5500"/>
    <stop offset="65%" stop-color="#ff8c00" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#ff5500" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="clipmagmashift"><rect width="280" height="130"/></clipPath>
</defs>

<rect width="280" height="130" fill="url(#bmagmashift)"/>
<rect width="280" height="130" fill="url(#gmagmashift)"/>

<g clip-path="url(#clipmagmashift)"><ellipse cx="109.6" cy="-15" rx="8.0" ry="11.4" fill="#ff5500" opacity="0.8">
      <animate attributeName="cy" values="-15;-15;141.41995253307277" dur="2.58s" begin="0.00s" repeatCount="indefinite"
        calcMode="spline" keySplines="0,0,1,0.2;0.4,0,0.6,1"/>
      <animate attributeName="rx" values="8.0;10.3;5.7" dur="2.58s" begin="0.00s" repeatCount="indefinite"/>
    </ellipse><ellipse cx="155.1" cy="-15" rx="5.4" ry="7.7" fill="#ff8c00" opacity="0.8">
      <animate attributeName="cy" values="-15;-15;137.7172249992651" dur="2.58s" begin="1.55s" repeatCount="indefinite"
        calcMode="spline" keySplines="0,0,1,0.2;0.4,0,0.6,1"/>
      <animate attributeName="rx" values="5.4;6.9;3.9" dur="2.58s" begin="1.55s" repeatCount="indefinite"/>
    </ellipse><ellipse cx="139.8" cy="-15" rx="10.5" ry="15.0" fill="#ff5500" opacity="0.8">
      <animate attributeName="cy" values="-15;-15;145.01224021776864" dur="2.58s" begin="3.10s" repeatCount="indefinite"
        calcMode="spline" keySplines="0,0,1,0.2;0.4,0,0.6,1"/>
      <animate attributeName="rx" values="10.5;13.5;7.5" dur="2.58s" begin="3.10s" repeatCount="indefinite"/>
    </ellipse>
  <ellipse cx="132.0" cy="125" rx="50" ry="10" fill="#ff5500" opacity="0.2">
    <animate attributeName="rx" values="50;60;50" dur="2.58s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.35;0.2" dur="2.58s" repeatCount="indefinite"/>
  </ellipse></g>

<rect width="280" height="130" fill="url(#tmagmashift)"/>

<text x="140" y="106"
  font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="800"
  fill="white" text-anchor="middle"
  paint-order="stroke" stroke="rgba(0,0,0,0.7)" stroke-width="4" stroke-linejoin="round"
>Magma Shift</text>


<rect x="110.6" y="116" width="58.8" height="13" fill="#cc2200" opacity="0.92" rx="3"/>
<text x="140" y="125.5"
  font-family="Inter,system-ui,sans-serif" font-size="7.5" font-weight="700"

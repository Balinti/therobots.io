    <stop offset="65%" stop-color="#00aacc" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="clipprismdrift"><rect width="280" height="130"/></clipPath>
</defs>

<rect width="280" height="130" fill="url(#bprismdrift)"/>
<rect width="280" height="130" fill="url(#gprismdrift)"/>


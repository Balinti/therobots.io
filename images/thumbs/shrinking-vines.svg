<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 130" width="280" height="130">
<defs>
  <linearGradient id="bshrinkingvines" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#041608"/>
    <stop offset="100%" stop-color="#020804"/>
  </linearGradient>
  <radialGradient id="gshrinkingvines" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#44cc44" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#44cc44" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="tshrinkingvines" x1="0" y1="0" x2="0" y2="1">
    <stop offset="40%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.88)"/>
  </linearGradient>
  <linearGradient id="lshrinkingvines" x1="0" y1="0" x2="1" y2="0">

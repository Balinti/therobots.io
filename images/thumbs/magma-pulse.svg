<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 130" width="280" height="130">
  <defs>
    <linearGradient id="bgmagma-pulse" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a0600"/>
      <stop offset="100%" stop-color="#0a0200"/>
    </linearGradient>
    <radialGradient id="glmagma-pulse" cx="76%" cy="38%" r="44%">
      <stop offset="0%" stop-color="#ff5500" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ff5500" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tfmagma-pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(0,0,0,0.78)"/>
      <stop offset="52%" stop-color="rgba(0,0,0,0.45)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </linearGradient>
    <linearGradient id="bfmagma-pulse" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.82)"/>
    </linearGradient>
    <linearGradient id="almagma-pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff5500"/>
      <stop offset="60%" stop-color="#ff5500" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff5500" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="280" height="130" fill="url(#bgmagma-pulse)"/>
  <rect width="280" height="130" fill="url(#glmagma-pulse)"/>

  
  <g>
    <!-- Large flame -->
    <g transform="translate(220,130)">
      <path d="M0,0 C-20,-38 -32,-72 -14,-100 C-7,-80 7,-76 11,-56 C15,-38 7,-20 0,0" fill="#ff5500" opacity="0.85">
        <animateTransform attributeName="transform" type="scale" values="1,1;1.07,1.12;0.96,1.05;1,1" dur="1.1s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.85;0.95;0.78;0.85" dur="1.1s" repeatCount="indefinite"/>
      </path>
      <path d="M0,0 C-10,-28 -15,-55 -6,-78 C-3,-62 6,-59 8,-44 C11,-30 4,-15 0,0" fill="#ff8c00" opacity="0.7">
        <animateTransform attributeName="transform" type="scale" values="1,1;0.93,1.14;1.04,1.06;1,1" dur="0.85s" repeatCount="indefinite"/>
      </path>
    </g>
    <!-- Small side flame -->
    <g transform="translate(188,130)">
      <path d="M0,0 C-10,-22 -17,-44 -7,-62 C-3,-48 4,-45 6,-32 C8,-21 2,-10 0,0" fill="#ff5500" opacity="0.6">
        <animateTransform attributeName="transform" type="scale" values="1,1;1.1,1.06;0.94,1.1;1,1" dur="1.4s" repeatCount="indefinite"/>
      </path>
    </g>
    <!-- Embers -->
    <circle cx="200" cy="90" r="2.5" fill="#ff8c00" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0.5;0" dur="1.8s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;-6,-55;-10,-100" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="218" cy="70" r="2" fill="#ff5500" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0.3;0" dur="2.2s" begin="0.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;8,-60;14,-105" dur="2.2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="210" cy="55" r="1.5" fill="#ff8c00" opacity="0">
      <animate attributeName="opacity" values="0;0.7;0;0" dur="1.5s" begin="1s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;4,-45;6,-80" dur="1.5s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <!-- Base glow -->
    <ellipse cx="212" cy="128" rx="48" ry="10" fill="#ff5500" opacity="0.18">
      <animate attributeName="rx" values="48;56;48" dur="1.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.18;0.32;0.18" dur="1.1s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <rect width="280" height="130" fill="url(#tfmagma-pulse)"/>
  <rect width="280" height="130" fill="url(#bfmagma-pulse)"/>

  <text x="12" y="96"
    font-family="Inter, system-ui, sans-serif"
    font-size="21" font-weight="800" fill="white"
    paint-order="stroke" stroke="rgba(0,0,0,0.6)" stroke-width="3" stroke-linejoin="round"
  >Magma Pulse</text>
  

  <rect x="12" y="113" width="59" height="14" fill="#cc2200" opacity="0.92" rx="2.5"/>
  <text x="19" y="123.5"
    font-family="Inter, system-ui, sans-serif"
    font-size="8" font-weight="700" letter-spacing="1" fill="white"
  >RHYTHM</text>

  <rect y="128" width="280" height="2.5" fill="url(#almagma-pulse)"/>
</svg>
    <stop offset="65%" stop-color="#7b2fbe" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#9d4edd" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="clipcircledrift"><rect width="280" height="130"/></clipPath>
</defs>

<rect width="280" height="130" fill="url(#bcircledrift)"/>

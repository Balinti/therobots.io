<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 130" width="280" height="130">
<defs>
  <linearGradient id="bwaveflicker" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#001830"/>
    <stop offset="100%" stop-color="#000810"/>
  </linearGradient>
  <radialGradient id="gwaveflicker" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#00ccff" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#00ccff" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="twaveflicker" x1="0" y1="0" x2="0" y2="1">
    <stop offset="40%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.88)"/>
  </linearGradient>
  <linearGradient id="lwaveflicker" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#00ccff"/>
    <stop offset="65%" stop-color="#0088cc" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#00ccff" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="clipwaveflicker"><rect width="280" height="130"/></clipPath>
</defs>

<rect width="280" height="130" fill="url(#bwaveflicker)"/>
<rect width="280" height="130" fill="url(#gwaveflicker)"/>

<g clip-path="url(#clipwaveflicker)"><circle cx="116.81516766939666" cy="75.27871598146825" r="8" fill="none" stroke="#00ccff" stroke-width="2.5" opacity="0">
      <animate attributeName="r" values="8;52.84077297729458" dur="2.13s" begin="0.00s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0" dur="2.13s" begin="0.00s" repeatCount="indefinite"/>
    </circle><circle cx="116.81516766939666" cy="75.27871598146825" r="8" fill="none" stroke="#00ccff" stroke-width="2.5" opacity="0">
      <animate attributeName="r" values="8;52.35641424831851" dur="2.13s" begin="0.71s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0" dur="2.13s" begin="0.71s" repeatCount="indefinite"/>
    </circle><circle cx="116.81516766939666" cy="75.27871598146825" r="8" fill="none" stroke="#00ccff" stroke-width="2.5" opacity="0">
      <animate attributeName="r" values="8;45.14325306404923" dur="2.13s" begin="1.42s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0" dur="2.13s" begin="1.42s" repeatCount="indefinite"/>
    </circle><circle cx="116.81516766939666" cy="75.27871598146825" r="7" fill="#00ccff" opacity="0.7">
    <animate attributeName="r" values="7;9;7" dur="1.06s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="1.06s" repeatCount="indefinite"/>
  </circle></g>

<rect width="280" height="130" fill="url(#twaveflicker)"/>

<text x="140" y="106"
  font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="800"
  fill="white" text-anchor="middle"
  paint-order="stroke" stroke="rgba(0,0,0,0.7)" stroke-width="4" stroke-linejoin="round"
>Wave Flicker</text>


<rect x="110.6" y="116" width="58.8" height="13" fill="#005588" opacity="0.92" rx="3"/>

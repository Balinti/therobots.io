    <stop offset="65%" stop-color="#c77dff" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#9d4edd" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="clipgravityflip"><rect width="280" height="130"/></clipPath>
</defs>

<rect width="280" height="130" fill="url(#bgravityflip)"/>
<rect width="280" height="130" fill="url(#ggravityflip)"/>


      <animate attributeName="opacity" values="0.8;0" dur="1.82s" begin="0.61s" repeatCount="indefinite"/>
    </circle><circle cx="176.3271289123984" cy="48.91118770439904" r="8" fill="none" stroke="#9d4edd" stroke-width="2.5" opacity="0">

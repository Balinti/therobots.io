<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 130" width="280" height="130">
<defs>
  <linearGradient id="bcloudshift" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#08060f"/>
    <stop offset="100%" stop-color="#040408"/>
  </linearGradient>
  <radialGradient id="gcloudshift" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#9d4edd" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#9d4edd" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="tcloudshift" x1="0" y1="0" x2="0" y2="1">
    <stop offset="40%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.88)"/>
  </linearGradient>
  <linearGradient id="lcloudshift" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#9d4edd"/>
    <stop offset="65%" stop-color="#7b2fbe" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#9d4edd" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="clipcloudshift"><rect width="280" height="130"/></clipPath>
</defs>

<rect width="280" height="130" fill="url(#bcloudshift)"/>
<rect width="280" height="130" fill="url(#gcloudshift)"/>

<g clip-path="url(#clipcloudshift)"><circle cx="146.9" cy="71.9" r="25.1" fill="#9d4edd" opacity="0.22">
      <animateTransform attributeName="transform" type="translate" values="0,0;-15.1,-14.5;0,0" dur="3.84s" begin="2.35s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.22;0.09;0.22" dur="3.84s" begin="2.35s" repeatCount="indefinite"/>
    </circle><rect x="238.8" y="62.9" width="6.1" height="6.1" fill="#7b2fbe" opacity="0.24" rx="1.8">
      <animateTransform attributeName="transform" type="translate" values="0,0;18.3,17.8;0,0" dur="3.81s" begin="3.11s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.24;0.10;0.24" dur="3.81s" begin="3.11s" repeatCount="indefinite"/>
    </rect><polygon points="61.2,42.5 52.2,54.8 37.8,50.1 37.8,34.9 52.2,30.2" fill="#9d4edd" opacity="0.34">
      <animateTransform attributeName="transform" type="translate" values="0,0;-3.8,8.8;0,0" dur="6.07s" begin="0.66s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.34;0.14;0.34" dur="6.07s" begin="0.66s" repeatCount="indefinite"/>
    </polygon><circle cx="80.3" cy="67.2" r="13.9" fill="#7b2fbe" opacity="0.31">
      <animateTransform attributeName="transform" type="translate" values="0,0;-9.2,-15.3;0,0" dur="3.34s" begin="2.53s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.31;0.12;0.31" dur="3.34s" begin="2.53s" repeatCount="indefinite"/>
    </circle><rect x="59.9" y="55.6" width="7.9" height="7.9" fill="#9d4edd" opacity="0.43" rx="2.4">
      <animateTransform attributeName="transform" type="translate" values="0,0;-8.5,-6.3;0,0" dur="3.58s" begin="3.91s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.43;0.17;0.43" dur="3.58s" begin="3.91s" repeatCount="indefinite"/>
    </rect></g>

<rect width="280" height="130" fill="url(#tcloudshift)"/>

<text x="140" y="106"
  font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="800"
  fill="white" text-anchor="middle"
  paint-order="stroke" stroke="rgba(0,0,0,0.7)" stroke-width="4" stroke-linejoin="round"
>Cloud Shift</text>


<rect x="110.6" y="116" width="58.8" height="13" fill="#5a189a" opacity="0.92" rx="3"/>
<text x="140" y="125.5"
  font-family="Inter,system-ui,sans-serif" font-size="7.5" font-weight="700"
  letter-spacing="1.2" fill="white" text-anchor="middle"
>ACTION</text>

<rect y="127.5" width="280" height="2.5" fill="url(#lcloudshift)"/>
</svg>
    <stop offset="65%" stop-color="#22aa22" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#44cc44" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="cliprootroll"><rect width="280" height="130"/></clipPath>
</defs>

<rect width="280" height="130" fill="url(#brootroll)"/>
<rect width="280" height="130" fill="url(#grootroll)"/>


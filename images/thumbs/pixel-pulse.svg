<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 130" width="280" height="130">
  <defs>
    <linearGradient id="bgpixel-pulse" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050520"/>
      <stop offset="100%" stop-color="#020210"/>
    </linearGradient>
    <radialGradient id="glpixel-pulse" cx="76%" cy="38%" r="44%">
      <stop offset="0%" stop-color="#4466ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#4466ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tfpixel-pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(0,0,0,0.78)"/>
      <stop offset="52%" stop-color="rgba(0,0,0,0.45)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </linearGradient>
    <linearGradient id="bfpixel-pulse" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.82)"/>
    </linearGradient>
    <linearGradient id="alpixel-pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4466ff"/>
      <stop offset="60%" stop-color="#4466ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4466ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="280" height="130" fill="url(#bgpixel-pulse)"/>
  <rect width="280" height="130" fill="url(#glpixel-pulse)"/>

  
  <g>
    <rect x="152" y="0" width="10" height="10" fill="#4466ff" opacity="0.07" rx="1"/><rect x="152" y="28" width="10" height="10" fill="#4466ff" opacity="0.07" rx="1"/><rect x="152" y="56" width="10" height="10" fill="#4466ff" opacity="0.07" rx="1"/><rect x="152" y="84" width="10" height="10" fill="#4466ff" opacity="0.07" rx="1"/><rect x="178" y="0" width="10" height="10" fill="#4466ff" opacity="0.07" rx="1"/><rect x="178" y="28" width="10" height="10" fill="#4466ff" opacity="0.07" rx="1"/><rect x="178" y="56" width="10" height="10" fill="#4466ff" opacity="0.07" rx="1"/><rect x="178" y="84" width="10" height="10" fill="#4466ff" opacity="0.07" rx="1"/><rect x="204" y="0" width="10" height="10" fill="#4466ff" opacity="0.07" rx="1"/><rect x="204" y="28" width="10" height="10" fill="#4466ff" opacity="0.07" rx="1"/><rect x="204" y="56" width="10" height="10" fill="#4466ff" opacity="0.07" rx="1"/><rect x="204" y="84" width="10" height="10" fill="#4466ff" opacity="0.07" rx="1"/><rect x="230" y="0" width="10" height="10" fill="#4466ff" opacity="0.07" rx="1"/><rect x="230" y="28" width="10" height="10" fill="#4466ff" opacity="0.07" rx="1"/><rect x="230" y="56" width="10" height="10" fill="#4466ff" opacity="0.07" rx="1"/><rect x="230" y="84" width="10" height="10" fill="#4466ff" opacity="0.07" rx="1"/><rect x="256" y="0" width="10" height="10" fill="#4466ff" opacity="0.07" rx="1"/><rect x="256" y="28" width="10" height="10" fill="#4466ff" opacity="0.07" rx="1"/><rect x="256" y="56" width="10" height="10" fill="#4466ff" opacity="0.07" rx="1"/><rect x="256" y="84" width="10" height="10" fill="#4466ff" opacity="0.07" rx="1"/>
    <!-- Robot walking left-to-right then back -->
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="148,28;272,44;148,28" dur="4s" repeatCount="indefinite"/>
      <!-- Body -->
      <rect x="-13" y="0" width="26" height="24" fill="#4466ff" opacity="0.55" rx="2"/>
      <!-- Head -->
      <rect x="-11" y="-20" width="22" height="17" fill="#4466ff" opacity="0.6" rx="1"/>
      <!-- Eyes: left blinks -->
      <rect x="-7" y="-16" width="6" height="7" fill="#2244dd" opacity="0.9"/>
      <rect x="2" y="-16" width="6" height="7" fill="#2244dd" opacity="0.9">
        <animate attributeName="height" values="7;1;7" dur="0.18s" begin="1.5s" repeatCount="indefinite"/>
        <animate attributeName="y" values="-16;-13;-16" dur="0.18s" begin="1.5s" repeatCount="indefinite"/>
      </rect>
      <!-- Left leg alternates -->
      <rect x="-9" y="24" width="9" height="14" fill="#4466ff" opacity="0.5" rx="1">
        <animate attributeName="height" values="14;6;14" dur="0.42s" repeatCount="indefinite"/>
        <animate attributeName="y" values="24;32;24" dur="0.42s" repeatCount="indefinite"/>
      </rect>
      <!-- Right leg alternates -->
      <rect x="2" y="24" width="9" height="14" fill="#4466ff" opacity="0.5" rx="1">
        <animate attributeName="height" values="6;14;6" dur="0.42s" repeatCount="indefinite"/>
        <animate attributeName="y" values="32;24;32" dur="0.42s" repeatCount="indefinite"/>
      </rect>
      <!-- Arms swing -->
      <rect x="-20" y="2" width="9" height="7" fill="#4466ff" opacity="0.45" rx="1">
        <animate attributeName="y" values="2;6;2" dur="0.42s" repeatCount="indefinite"/>
      </rect>
      <rect x="13" y="6" width="9" height="7" fill="#4466ff" opacity="0.45" rx="1">
        <animate attributeName="y" values="6;2;6" dur="0.42s" repeatCount="indefinite"/>
      </rect>
    </g>
    <!-- Pixel score dots -->
    <rect x="152" y="8" width="8" height="8" fill="#4466ff" opacity="0.45" rx="1">
      <animate attributeName="opacity" values="0.45;0.9;0.45" dur="1s" repeatCount="indefinite"/>
    </rect>
    <rect x="165" y="8" width="8" height="8" fill="#2244dd" opacity="0.35" rx="1">
      <animate attributeName="opacity" values="0.35;0.8;0.35" dur="1.3s" begin="0.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="178" y="8" width="8" height="8" fill="#4466ff" opacity="0.3" rx="1">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="0.9s" begin="0.6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <rect width="280" height="130" fill="url(#tfpixel-pulse)"/>
  <rect width="280" height="130" fill="url(#bfpixel-pulse)"/>

  <text x="12" y="96"
    font-family="Inter, system-ui, sans-serif"
    font-size="21" font-weight="800" fill="white"
    paint-order="stroke" stroke="rgba(0,0,0,0.6)" stroke-width="3" stroke-linejoin="round"
  >Pixel Pulse</text>
  

  <rect x="12" y="113" width="59" height="14" fill="#1133aa" opacity="0.92" rx="2.5"/>
  <text x="19" y="123.5"
    font-family="Inter, system-ui, sans-serif"
    font-size="8" font-weight="700" letter-spacing="1" fill="white"
  >RHYTHM</text>

  <rect y="128" width="280" height="2.5" fill="url(#alpixel-pulse)"/>
</svg>